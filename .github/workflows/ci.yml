name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22', '24']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Matterbridge is a peer dep — we don't declare it in package.json (to avoid
      # plugin duplication at runtime), so install it globally and link before build.
      - name: Install and link Matterbridge
        run: |
          npm install --global matterbridge
          npm link matterbridge

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish-dry-run:
    name: npm pack (dry run)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm install --global matterbridge
      - run: npm link matterbridge
      - run: npm run build
      - name: Pack
        run: npm pack --dry-run
